<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./travel_recommendation.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <title>TravelWebSite...</title>
</head>

<body>
    <nav class='header'>
        <div class="logo"><img src="./images/logo.jpg" width="40px" height="40px">
            <h1>TravelBloom</h1>
        </div>
        <ul class="header-item">
            <li><a href="travel_recommendation.html" id="home"> Home</a></li>
            <li><a href="travel_recommendation_aboutus.html" id="About"> About us</a></li>
            <li><a href="index.html" id="contacts"> Contact us</a></li>
        </ul>
        <div class="search-Menu">
            <input class="search-text" type="text" id="search-text" placeholder="Enter a destination or Key">
            <div class="seach-control">
                <img src="./images/search.png" width="20px" height="20px" class="search-icon">
                <button id='btnSearch' class="btn-searchMenu">Search</button><button id='btnClear'
                    class="btn-clearMenu">Clear</button>
            </div>
        </div>

    </nav>


        <div class="container">

            <div class="section-content">


                <ul class="about-social-icons">
                    <li><a href="#"><i class="fab fa-facebook"></i></a></li>
                    <li><a href="#"><i class="fab fa-twitter"></i></a></li>
                    <li><a href="#"><i class="fab fa-instagram"></i></a></li>
                    <li><a href="#"><i class="fab fa-youtube"></i></a></li>
                </ul>
               
                <div class="contact-info">
                    <h1 class="contact-intro">Contact Us</h1>
                    <p class="contact-desription">Get in Touch</p>
                </div>
                <div class="mailus"> 
                    <form id="contactForm">
                        <div>
                            <label for="name">Name</label>
                            <input class="input-form" type="text" id="name" name="name" required  placeholder="Enter The Name">
                        </div>
                        <div>
                            <label for="email">Email</label>
                            <input  class="input-form" type="email" id="email" name="email" required placeholder="Enter The Email">
                        </div>
                       
                        <div>
                            <label for="message">Message</label>
                            <textarea class="input-form"  id="message" name="message" rows="5" required placeholder="Enter Your Message"></textarea>
                        </div>
                        <button type="submit" class="btn-contact" onclick="thankyou()">Submit</button>
                    </form>
                    <script>
                        function thankyou() {
                            alert('Thank you for contacting us!')
                        }
                    </script>
                </div>


            </div>
        </div>
  <div  id="result-content"></div>
    <script src="./travel_recommendation.js"></script>
</body>

</html>
